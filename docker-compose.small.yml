# Extra-low memory profile for instances with ~1GB RAM (e.g. t2.micro / t3.micro).
# Used automatically by scripts/start-production.sh when total RAM < 2GB.
#
# Manual use:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.small.yml docker compose up -d

services:
  elasticsearch:
    environment:
      ES_JAVA_OPTS: -Xms128m -Xmx128m
    mem_limit: 384m

  kafka:
    environment:
      KAFKA_HEAP_OPTS: -Xmx192m -Xms192m
    mem_limit: 384m

  postgres:
    mem_limit: 256m

  redis:
    mem_limit: 128m
