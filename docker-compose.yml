services:
  products-service:
    build:
      context: .
      args:
        NODE_ENV: ${NODE_ENV:-development}
    env_file:
      - .env
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
      - "${GRPC_PORT:-50051}:${GRPC_PORT:-50051}"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3001}
      GRPC_PORT: ${GRPC_PORT:-50051}
      DATABASE_URL: postgresql://products:products_secret@postgres:5432/products_db?schema=public
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_ENABLED: ${ELASTICSEARCH_ENABLED:-true}
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      KAFKA_ENABLED: ${KAFKA_ENABLED:-true}
      KAFKA_BROKERS: kafka:9092
      PASSPORT_PUBLIC_KEY: ${PASSPORT_PUBLIC_KEY}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-}
      STOCK_RESERVATION_TTL_SECONDS: 900
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:$${PORT:-3001}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: products
      POSTGRES_PASSWORD: products_secret
      POSTGRES_DB: products_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U products -d products_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticsearch:
    profiles: [full]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=false
      - ES_JAVA_OPTS=${ES_JAVA_OPTS:--Xms256m -Xmx256m}
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    mem_limit: ${ES_MEM_LIMIT:-512m}
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\\|yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  kafka:
    profiles: [full]
    image: bitnamilegacy/kafka:3.7.0-debian-12-r7
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xmx256m -Xms256m}
    mem_limit: ${KAFKA_MEM_LIMIT:-512m}
    volumes:
      - kafka_data:/bitnami/kafka

volumes:
  postgres_data:
  es_data:
  kafka_data:
