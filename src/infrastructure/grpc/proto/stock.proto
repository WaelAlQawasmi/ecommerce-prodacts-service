syntax = "proto3";

package products;

service StockService {
  rpc ReserveStock (ReserveStockRequest) returns (ReserveStockResponse);
  rpc GetStockAvailability (StockAvailabilityRequest) returns (StockAvailabilityResponse);
}

message ReserveStockRequest {
  int64 product_id = 1;
  string order_id = 2;
  int32 quantity = 3;
  optional int32 ttl_seconds = 4;
}

message ReserveStockResponse {
  int64 reservation_id = 1;
  int64 product_id = 2;
  string order_id = 3;
  int32 quantity = 4;
  string expires_at = 5;
  string status = 6;
}

message StockAvailabilityRequest {
  int64 product_id = 1;
}

message StockAvailabilityResponse {
  int64 product_id = 1;
  int32 total_stock = 2;
  int32 reserved_stock = 3;
  int32 available_stock = 4;
}
